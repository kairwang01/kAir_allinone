<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phase 1 Low-Fi Prototype</title>
<style>
  :root {
    --bg-main: #f5f5f5;
    --border-color: #666;
    --text-primary: #333;
    --text-secondary: #666;
    --bg-card: #ffffff;
    --bg-sheet: #e0e0e0;
    --radius: 8px;
  }

  body { 
    margin: 0; 
    background: #ccc; 
    color: var(--text-primary); 
    font-family: monospace, sans-serif; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    height: 100vh; 
    overflow: hidden; 
  }
  
  /* Mock Device Constraints - Wireframe */
  #device { 
    width: 390px; 
    height: 844px; 
    background: var(--bg-main); 
    border-radius: 40px; 
    border: 4px solid #333; 
    position: relative; 
    display: flex; 
    flex-direction: column; 
    overflow: hidden; 
  }

  /* Layer 3: Feed */
  #feed { 
    flex: 1; 
    overflow-y: auto; 
    padding: 16px; 
    display: flex; 
    flex-direction: column; 
    gap: 16px; 
    padding-bottom: 150px; /* Space for Chat + Chips */
    justify-content: flex-end;
  }
  
  /* User Message */
  .user-msg {
    align-self: flex-end; 
    background: #e5e5e5; 
    padding: 12px 16px; 
    border-radius: var(--radius); 
    border: 1px dashed var(--border-color); 
    max-width: 80%; 
    font-size: 14px; 
  }

  /* Layer 2: Recommended Next */
  #recommended-next { 
    position: absolute; 
    bottom: 80px; 
    left: 0; 
    right: 0; 
    padding: 8px 16px; 
    display: flex; 
    gap: 8px; 
    overflow-x: auto; 
    background: linear-gradient(to top, rgba(245,245,245,1) 50%, rgba(245,245,245,0));
    opacity: 0; 
    transition: opacity 0.3s;
    z-index: 5;
  }
  .chip { 
    background: #fff; 
    border-radius: 16px; 
    padding: 6px 12px; 
    font-size: 12px; 
    white-space: nowrap; 
    border: 1px solid var(--border-color); 
    cursor: pointer; 
  }
  
  /* Layer 1: Chat Input */
  #chat-layer { 
    position: absolute; 
    bottom: 0; 
    left: 0; 
    right: 0; 
    padding: 16px; 
    background: var(--bg-main); 
    border-top: 1px solid var(--border-color);
    z-index: 10; 
  }
  .input-box { 
    background: #fff; 
    border-radius: var(--radius); 
    padding: 12px 16px; 
    font-size: 14px; 
    border: 1px solid var(--border-color); 
    display: flex;
    justify-content: space-between;
  }
  
  /* Layer 3: Action Cards */
  .card { 
    background: var(--bg-card); 
    border-radius: var(--radius); 
    padding: 16px; 
    border: 1px solid var(--border-color); 
    position: relative; 
  }
  .card-header { 
    display: flex; 
    justify-content: space-between;
    font-size: 12px; 
    color: var(--text-secondary); 
    margin-bottom: 12px; 
    border-bottom: 1px dashed #ccc;
    padding-bottom: 8px;
  }
  .card-title { font-size: 18px; font-weight: bold; margin-bottom: 4px; }
  .card-sub { font-size: 14px; color: var(--text-secondary); margin-bottom: 16px; }
  .cta-primary, .cta-secondary { 
    padding: 10px; 
    border-radius: var(--radius); 
    text-align: center; 
    font-size: 14px;
    cursor: pointer; 
    border: 1px solid var(--border-color);
  }
  .cta-primary { background: #333; color: #fff; font-weight: bold; }
  .cta-secondary { background: #fff; color: #333; margin-top: 8px; }
  
  /* Layer 4: Detail Sheet */
  #sheet { 
    position: absolute; 
    bottom: 0; left: 0; right: 0; 
    height: 80%; 
    background: var(--bg-sheet); 
    border-radius: 16px 16px 0 0; 
    border: 2px solid var(--border-color);
    z-index: 20; 
    transform: translateY(100%); 
    transition: transform 0.3s; 
    padding: 16px; 
  }
  #sheet.open { transform: translateY(0); }
  .sheet-handle { width: 40px; height: 4px; background: #999; border-radius: 2px; margin: 0 auto 16px; }

  /* Layer 4: Full-screen Modal */
  #fullscreen {
    position: absolute;
    top: 0; bottom: 0; left: 0; right: 0;
    background: #fff;
    z-index: 30;
    transform: translateY(100%);
    transition: transform 0.3s;
    padding: 20px;
    display: flex;
    flex-direction: column;
  }
  #fullscreen.open { transform: translateY(0); }
  
  /* Mini Player Layer 4 */
  #mini-player { 
    position: absolute; 
    bottom: 130px; left: 16px; right: 16px; 
    background: #fff; 
    border-radius: var(--radius); 
    border: 1px solid var(--border-color);
    padding: 12px; 
    display: flex; 
    align-items: center; justify-content: space-between;
    z-index: 15; 
    transform: translateY(200%); 
    transition: transform 0.3s; 
  }
  #mini-player.show { transform: translateY(0); }

  /* Dev tools overlay */
  #dev-controls { position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 100; }
  button { padding: 10px; background: #eee; border: 1px solid #333; cursor: pointer; text-align: left; font-family: monospace;}
  button:hover { background: #ddd; }
</style>
</head>
<body>

<div id="dev-controls">
  <div><strong>Trigger Low-Fi Flows:</strong></div>
  <button onclick="runFlow('dining')">[1] 吃饭 / 本地探索</button>
  <button onclick="runFlow('commute')">[2] 路线 / 通勤决策</button>
  <button onclick="runFlow('music')">[3] 听歌 / 情境播放</button>
  <button onclick="runFlow('search')">[4] 搜索 / 网页阅读</button>
  <button onclick="runFlow('tool')">[5] 工具型倒计时</button>
  <button onclick="reset()">↺ Reset</button>
</div>

<div id="device">
  <div id="feed">
    <div style="text-align:center; color:#999; font-size:12px; margin-bottom:auto;">-- Low-Fi Prototype Initialized --</div>
  </div>
  
  <div id="mini-player">
    <div style="font-weight:bold;">Deep Focus (Playing)</div>
    <div style="border:1px solid #333; padding:2px 6px; cursor:pointer;" onclick="openFullscreen('player')">Expand</div>
  </div>

  <div id="recommended-next"></div>
  
  <div id="chat-layer">
    <div class="input-box">
      <span id="input-display">输入框区...</span>
      <span>↑</span>
    </div>
  </div>

  <div id="sheet">
    <div class="sheet-handle" onclick="closeSheet()"></div>
    <div id="sheet-content"></div>
  </div>

  <div id="fullscreen">
    <div id="fullscreen-content" style="flex:1;"></div>
    <div class="cta-primary" onclick="closeFullscreen()">返回 / 退出</div>
  </div>
</div>

<script>
  const feed = document.getElementById('feed');
  const inputDisplay = document.getElementById('input-display');
  const recommendedNext = document.getElementById('recommended-next');
  const sheet = document.getElementById('sheet');
  const sheetContent = document.getElementById('sheet-content');
  const fullscreen = document.getElementById('fullscreen');
  const fullscreenContent = document.getElementById('fullscreen-content');
  const miniPlayer = document.getElementById('mini-player');

  let currentFlow = '';

  function reset() {
    feed.innerHTML = '<div style="text-align:center; color:#999; font-size:12px; margin-bottom:auto;">-- Low-Fi Prototype Initialized --</div>';
    inputDisplay.innerHTML = '输入框区...';
    recommendedNext.style.opacity = '0';
    sheet.classList.remove('open');
    fullscreen.classList.remove('open');
    miniPlayer.classList.remove('show');
  }

  function appendUserMessage(text) {
    const msg = document.createElement('div');
    msg.className = 'user-msg';
    msg.innerText = text;
    feed.appendChild(msg);
    scrollToBottom();
  }

  function scrollToBottom() {
    setTimeout(() => { feed.scrollTop = feed.scrollHeight; }, 50);
  }

  function setChips(chips) {
    recommendedNext.innerHTML = chips.map(c => `<div class="chip">[${c}]</div>`).join('');
    recommendedNext.style.opacity = '1';
  }

  function appendCard(html) {
    const wrapper = document.createElement('div');
    wrapper.innerHTML = html;
    feed.appendChild(wrapper.firstElementChild);
    scrollToBottom();
  }

  function openSheet(contentHTML) {
    sheetContent.innerHTML = contentHTML;
    sheet.classList.add('open');
    recommendedNext.style.opacity = '0'; // Fold chips when execution opens
  }

  function closeSheet() {
    sheet.classList.remove('open');
    triggerWeakReflow();
  }

  function openFullscreen(type) {
    let content = '';
    if (type === 'nav') content = '<h2>导航接管 (L4 Full-screen)</h2><div style="height:200px; border:1px dashed #333; margin-top:20px; display:flex; align-items:center; justify-content:center;">地图区域</div>';
    if (type === 'reader') content = '<h2>阅读器 (L4 Full-screen)</h2><div style="border:1px dashed #333; padding:10px; margin-top:20px;">正文内容... 去除广告。</div>';
    if (type === 'player') content = '<h2>全屏播放器 (L4 Full-screen)</h2><div style="height:200px; border:1px dashed #333; margin-top:20px; display:flex; align-items:center; justify-content:center;">封面与歌词</div>';
    
    fullscreenContent.innerHTML = content;
    fullscreen.classList.add('open');
    sheet.classList.remove('open'); // Ensure no double modal
    recommendedNext.style.opacity = '0';
  }

  function closeFullscreen() {
    fullscreen.classList.remove('open');
    if (currentFlow === 'commute') triggerStrongReflow();
    else if (currentFlow === 'search') triggerWeakReflow();
    else if (currentFlow === 'music') {
      miniPlayer.classList.add('show');
      setChips(['开启番茄钟 25 分钟', '开启免打扰', '切到专注风格']);
    }
  }

  function triggerWeakReflow() {
    if(currentFlow === 'dining') setChips(['导航去这里', '发给朋友', '看附近备选']);
    if(currentFlow === 'search') setChips(['追问：内存需求？', '总结文章', '只看官方来源']);
  }

  function triggerStrongReflow() {
    if(currentFlow === 'commute') setChips(['开启回家模式', '播放放松音乐', '记录本次通勤']);
  }

  async function runFlow(type) {
    reset();
    currentFlow = type;
    
    if (type === 'dining') {
      appendUserMessage('这附近有什么适合两个人安静吃饭的地方？');
      setTimeout(() => {
        setChips(['距离优先', '安静氛围', '人均 < 300']);
        appendCard(`
          <div class="card">
            <div class="card-header"><span>Location | 餐厅</span><span>···</span></div>
            <div class="card-title">Bistro 隐</div>
            <div class="card-sub">4.8分 · 距离 800m<br>极其安静，适合约会</div>
            <div class="cta-primary" onclick="openSheet('<h2>Bistro 隐详情 (L4 Sheet)</h2><p>菜单内容...</p>')">查看详情 (Primary)</div>
            <div class="cta-secondary">直接导航 (Secondary)</div>
          </div>
        `);
      }, 500);
    } 
    else if (type === 'commute') {
      appendUserMessage('我现在回家最快怎么走？');
      setTimeout(() => {
        setChips(['晚高峰拥堵', '地铁更稳', '少步行']);
        appendCard(`
          <div class="card">
            <div class="card-header"><span>Route | 导航</span><span>···</span></div>
            <div class="card-title">驾车 vs 地铁</div>
            <div class="card-sub">地铁 35分钟<br>驾车 45分钟 (主干道拥堵)</div>
            <div class="cta-primary" onclick="openFullscreen('nav')">开始导航 (进入 Full-screen)</div>
          </div>
        `);
      }, 500);
    }
    else if (type === 'music') {
      appendUserMessage('放点适合写代码听的歌');
      setTimeout(() => {
        setChips(['纯音乐', '沉浸', '低打扰']);
        appendCard(`
          <div class="card">
            <div class="card-header"><span>Song/Playlist | 音乐</span><span>···</span></div>
            <div class="card-title">Deep Focus</div>
            <div class="card-sub">播放列表 · 50首纯音乐</div>
            <div class="cta-primary" onclick="miniPlayer.classList.add('show'); this.innerText='[Playing]';">立即播放 (后台常驻)</div>
          </div>
        `);
      }, 500);
    }
    else if (type === 'search') {
      appendUserMessage('解释一下最新的 Apple Intelligence 架构');
      setTimeout(() => {
        setChips(['全部信源', '仅官方文档', '仅科技媒体']);
        appendCard(`
          <div class="card">
            <div class="card-header"><span>Answer | 搜索结果</span><span>···</span></div>
            <div class="card-title">端云协同混合架构</div>
            <div class="card-sub">本地小模型处理隐私任务，云端大模型路由复杂推断。[1][2]</div>
            <div class="cta-primary" onclick="openFullscreen('reader')">阅读原文 (进入 Reader)</div>
            <div class="cta-secondary">继续追问</div>
          </div>
        `);
      }, 500);
    }
    else if (type === 'tool') {
      appendUserMessage('帮我倒计时 15 分钟');
      setTimeout(() => {
        setChips(['改成 25 分钟', '改成 30 分钟']);
        appendCard(`
          <div class="card" id="timer-card">
            <div class="card-header"><span>Tool | 倒计时 (Live)</span><span>···</span></div>
            <div class="card-title" id="timer-text" style="font-size:32px; text-align:center;">14:59</div>
            <div class="card-sub" style="text-align:center;">进行中...</div>
            <div class="cta-primary" id="timer-btn" onclick="toggleTimer()">暂停</div>
            <div class="cta-secondary">取消</div>
          </div>
        `);
        // Simulate timer completion
        setTimeout(() => {
          const tc = document.getElementById('timer-card');
          if(tc && currentFlow==='tool') {
            document.getElementById('timer-text').innerText = '00:00';
            tc.querySelector('.card-sub').innerText = 'Completed';
            const btn = document.getElementById('timer-btn');
            btn.innerText = '重新开始';
            btn.onclick = null;
          }
        }, 3000);
      }, 500);
    }
  }

  function toggleTimer() {
    const btn = document.getElementById('timer-btn');
    if(btn.innerText === '暂停') btn.innerText = '继续';
    else btn.innerText = '暂停';
  }
</script>
</body>
</html>
